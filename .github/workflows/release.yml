name: Release
run-name: release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev ffmpeg
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install curl ffmpeg
      - run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build
      - run: mv build/termfm build/termfm-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'macos' }}
      - uses: softprops/action-gh-release@v2
        with:
          files: build/termfm-*